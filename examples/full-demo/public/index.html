<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity — API Tester</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0e0e10; color: #e0e0e0; display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar { width: 280px; background: #16161a; border-right: 1px solid #2a2a2e; overflow-y: auto; flex-shrink: 0; }
  .sidebar h2 { padding: 16px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a2e; }
  .endpoint { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #1e1e22; display: flex; align-items: center; gap: 8px; }
  .endpoint:hover { background: #1e1e24; }
  .endpoint.active { background: #1e1e28; border-left: 3px solid #7c5cfc; }
  .method { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 3px; min-width: 42px; text-align: center; }
  .method.GET { background: #1a3a2a; color: #4ade80; }
  .method.POST { background: #1a2a3a; color: #60a5fa; }
  .method.DELETE { background: #3a1a1a; color: #f87171; }
  .endpoint .path { font-size: 13px; color: #ccc; }

  /* Main area */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Request panel */
  .request-panel { padding: 20px; border-bottom: 1px solid #2a2a2e; background: #131316; }
  .request-panel h3 { margin-bottom: 12px; font-size: 15px; }
  .req-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .req-row label { font-size: 12px; color: #888; min-width: 80px; }
  .req-row input, .req-row textarea { background: #1e1e24; border: 1px solid #333; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; flex: 1; }
  .req-row textarea { min-height: 80px; resize: vertical; }
  .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-send { background: #7c5cfc; color: #fff; }
  .btn-send:hover { background: #6a4ae0; }
  .btn-send:active { background: #5838c4; }

  /* Response panel */
  .response-panel { flex: 1; overflow-y: auto; padding: 20px; }
  .response-panel h3 { margin-bottom: 12px; font-size: 15px; }
  .response-meta { display: flex; gap: 16px; margin-bottom: 12px; font-size: 13px; }
  .response-meta span { padding: 3px 10px; border-radius: 3px; }
  .status-ok { background: #1a3a2a; color: #4ade80; }
  .status-err { background: #3a1a1a; color: #f87171; }
  .status-warn { background: #3a3a1a; color: #facc15; }
  .response-body { background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 6px; padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; max-height: 50vh; overflow-y: auto; }

  /* Log panel */
  .log-panel { height: 200px; background: #111114; border-top: 1px solid #2a2a2e; overflow-y: auto; flex-shrink: 0; }
  .log-panel h3 { padding: 8px 16px; font-size: 13px; color: #888; border-bottom: 1px solid #1e1e22; position: sticky; top: 0; background: #111114; display: flex; justify-content: space-between; align-items: center; }
  .log-panel h3 .btn-clear { background: none; border: 1px solid #333; color: #888; padding: 2px 8px; font-size: 11px; }
  .log-entry { padding: 4px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; border-bottom: 1px solid #1a1a1e; display: flex; gap: 12px; }
  .log-entry .log-time { color: #555; min-width: 70px; }
  .log-entry .log-method { min-width: 50px; font-weight: 700; }
  .log-entry .log-status { min-width: 30px; }
  .log-entry .log-dur { color: #7c5cfc; min-width: 70px; text-align: right; }
  .log-entry .log-size { color: #888; min-width: 70px; text-align: right; }
  .log-entry .log-path { color: #ccc; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Endpoints</h2>
  <div id="endpoints"></div>
</div>

<div class="main">
  <div class="request-panel">
    <h3 id="req-title">Select an endpoint</h3>
    <div class="req-row">
      <label>URL</label>
      <input type="text" id="req-url" placeholder="/api/health" />
      <button class="btn btn-send" id="btn-send">Send</button>
    </div>
    <div class="req-row" id="row-auth">
      <label>Auth Token</label>
      <input type="text" id="req-auth" value="Bearer demo" />
    </div>
    <div class="req-row hidden" id="row-body">
      <label>Body (JSON)</label>
      <textarea id="req-body"></textarea>
    </div>
  </div>

  <div class="response-panel">
    <h3>Response</h3>
    <div class="response-meta" id="res-meta"></div>
    <div class="response-body" id="res-body">No request sent yet.</div>
  </div>

  <div class="log-panel">
    <h3>
      Performance Log
      <button class="btn btn-clear" onclick="clearLog()">Clear</button>
    </h3>
    <div id="log"></div>
  </div>
</div>

<script>
const BASE = '';  // relative URLs — same origin, avoids ad-blocker interception

const ENDPOINTS = [
  { method: 'GET',    path: '/api/health',    body: null, auth: false },
  { method: 'GET',    path: '/api/users',     body: null, auth: false },
  { method: 'GET',    path: '/api/users/:id', body: null, auth: false },
  { method: 'POST',   path: '/api/users',     body: { name: 'Alice', email: 'alice@test.com', age: 28 }, auth: true },
  { method: 'DELETE', path: '/api/users/:id',  body: null, auth: true },
  { method: 'GET',    path: '/api/posts',     body: null, auth: false },
  { method: 'GET',    path: '/api/posts/:id', body: null, auth: false },
  { method: 'POST',   path: '/api/posts',     body: { title: 'New Post', content: 'Post body here', author: 'Alice' }, auth: true },
  { method: 'DELETE', path: '/api/posts/:id',  body: null, auth: true },
];

let activeIdx = -1;

// --- Render sidebar ---
const endpointsEl = document.getElementById('endpoints');
ENDPOINTS.forEach((ep, i) => {
  const div = document.createElement('div');
  div.className = 'endpoint';
  div.innerHTML = `<span class="method ${ep.method}">${ep.method}</span><span class="path">${ep.path}</span>`;
  div.onclick = () => selectEndpoint(i);
  endpointsEl.appendChild(div);
});

function selectEndpoint(i) {
  activeIdx = i;
  const ep = ENDPOINTS[i];

  document.querySelectorAll('.endpoint').forEach((el, j) => el.classList.toggle('active', j === i));
  document.getElementById('req-title').textContent = `${ep.method} ${ep.path}`;

  // Resolve :id placeholders with a prompt-free default
  let url = ep.path;
  if (url.includes(':id')) url = url.replace(':id', '1');
  document.getElementById('req-url').value = url;

  const rowBody = document.getElementById('row-body');
  if (ep.body) {
    rowBody.classList.remove('hidden');
    document.getElementById('req-body').value = JSON.stringify(ep.body, null, 2);
  } else {
    rowBody.classList.add('hidden');
    document.getElementById('req-body').value = '';
  }
}

// --- Send request ---
document.getElementById('btn-send').onclick = sendRequest;
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendRequest();
});

async function sendRequest() {
  const ep = activeIdx >= 0 ? ENDPOINTS[activeIdx] : null;
  const method = ep ? ep.method : 'GET';
  const url = document.getElementById('req-url').value;
  const auth = document.getElementById('req-auth').value;
  const bodyStr = document.getElementById('req-body').value;

  const headers = {};
  if (auth) headers['Authorization'] = auth;

  const opts = { method, headers };
  if (bodyStr && ['POST', 'PUT', 'PATCH'].includes(method)) {
    headers['Content-Type'] = 'application/json';
    opts.body = bodyStr;
  }

  const resBody = document.getElementById('res-body');
  const resMeta = document.getElementById('res-meta');
  resBody.textContent = 'Loading...';
  resMeta.innerHTML = '';

  const t0 = performance.now();
  try {
    const res = await fetch(BASE + url, opts);
    const t1 = performance.now();
    const duration = t1 - t0;

    const text = await res.text();
    const size = new Blob([text]).size;
    let display = text;
    try { display = JSON.stringify(JSON.parse(text), null, 2); } catch {}

    const statusClass = res.status < 300 ? 'status-ok' : res.status < 400 ? 'status-warn' : 'status-err';

    resMeta.innerHTML = `
      <span class="${statusClass}">${res.status} ${res.statusText}</span>
      <span style="color:#7c5cfc">${duration.toFixed(1)} ms</span>
      <span style="color:#888">${formatBytes(size)}</span>
    `;
    resBody.textContent = display;

    addLog(method, url, res.status, duration, size);
  } catch (err) {
    const t1 = performance.now();
    resMeta.innerHTML = `<span class="status-err">Network Error</span><span style="color:#7c5cfc">${(t1 - t0).toFixed(1)} ms</span>`;
    resBody.textContent = err.message;
    addLog(method, url, 0, t1 - t0, 0);
  }
}

// --- Log ---
function addLog(method, path, status, duration, size) {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';

  const methodColor = method === 'GET' ? '#4ade80' : method === 'POST' ? '#60a5fa' : '#f87171';
  const statusColor = status < 300 ? '#4ade80' : status < 400 ? '#facc15' : '#f87171';
  const durColor = duration < 50 ? '#4ade80' : duration < 200 ? '#facc15' : '#f87171';

  entry.innerHTML = `
    <span class="log-time">${new Date().toLocaleTimeString()}</span>
    <span class="log-method" style="color:${methodColor}">${method}</span>
    <span class="log-path">${path}</span>
    <span class="log-status" style="color:${statusColor}">${status || 'ERR'}</span>
    <span class="log-dur" style="color:${durColor}">${duration.toFixed(1)} ms</span>
    <span class="log-size">${formatBytes(size)}</span>
  `;
  log.prepend(entry);
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

// Select first endpoint on load
selectEndpoint(0);
</script>
</body>
</html>
